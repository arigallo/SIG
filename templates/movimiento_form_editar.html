{% extends "base.html" %}

{% block title %}Editar movimiento{% endblock %}

{% block content %}
<h2>Editar movimiento</h2>

<form method="post" enctype="multipart/form-data" class="card form-card form-card-medium">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <div class="field">
        <label>Fecha</label>
        <input type="date" name="fecha" value="{{ movimiento['fecha'] }}" required>
    </div>

    <div class="field">
        <label>Tipo</label>
        <select name="tipo" required>
            <option value="ingreso" {% if movimiento['tipo'] == 'ingreso' %}selected{% endif %}>Ingreso</option>
            <option value="egreso" {% if movimiento['tipo'] == 'egreso' %}selected{% endif %}>Egreso</option>
        </select>
    </div>

    <div class="field">
        <label>Concepto</label>
        <input type="text" name="concepto" value="{{ movimiento['concepto'] }}">
    </div>

    <div class="field">
        <label>Monto</label>
        <input type="number" step="0.01" name="monto" value="{{ movimiento['monto'] }}">
    </div>

    <div class="field">
        <label>Referencia</label>
        <input type="text" name="referencia" value="{{ movimiento['referencia'] }}">
    </div>

    <div class="field">
        <label>Comprobante</label>
        {% if movimiento.get('comprobante_drive_file_id') %}
            <p class="muted-line">
                Actual: <a href="{{ url_for('descargar_comprobante_movimiento', movimiento_id=movimiento['id']) }}" target="_blank" rel="noopener">{{ movimiento.get('comprobante_nombre') or 'Ver comprobante' }}</a>
            </p>
        {% endif %}
        <label class="upload-dropzone" data-upload-dropzone tabindex="0">
            <input class="upload-input"
                   type="file"
                   name="comprobante_pago"
                   accept=".pdf,.jpg,.jpeg,.png,application/pdf,image/jpeg,image/png">
            <span class="upload-title">Arrastra un comprobante nuevo o hace clic para elegirlo</span>
            <span class="upload-hint">Si dejas monto o referencia vacios, SIG intenta leerlos del comprobante.</span>
        </label>
    </div>

    <div class="actions-row">
        <button class="button" type="submit">Guardar cambios</button>
        <a class="button secondary" href="{{ url_for('ver_caja') }}">Cancelar</a>
    </div>
</form>
{% endblock %}
