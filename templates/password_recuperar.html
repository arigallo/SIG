<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar clave - SIG</title>
    <link rel="stylesheet" href="{{ static_asset('styles.css') }}">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="login-logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo del club">
        </div>

        <h1>Recuperar clave</h1>
        <h2>Ingresa el email asociado a tu usuario.</h2>

        <form method="post">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div>
                <label>Email</label>
                <input type="email" name="email" autocomplete="email" required>
            </div>

            <button class="button login-button" type="submit">Enviar enlace</button>
        </form>

        <div class="login-links">
            <a href="{{ url_for('login') }}">Volver al ingreso</a>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }} login-flash">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

</body>
</html>
