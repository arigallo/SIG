<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Portal del jugador</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="login-logo">
            <picture>
                <source srcset="{{ url_for('static', filename='img/logo-login.webp') }}" type="image/webp">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo del club">
            </picture>
        </div>

        <h1>Portal del jugador</h1>
        <h2>Ingresa con tu DNI</h2>

        <form method="post">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div>
                <label>DNI</label>
                <input type="text" name="identificador" value="{{ identificador or '' }}" inputmode="numeric" autocomplete="username" placeholder="Solo numeros" required>
            </div>

            <button class="button login-button" type="submit">Entrar al portal</button>
        </form>

        <div class="login-links">
            <a href="{{ url_for('login') }}">Acceso administraci&oacute;n</a>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }} login-flash">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

</body>
</html>
