<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer clave - SIG</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="login-logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo del club">
        </div>

        <h1>Nueva clave</h1>
        <h2>{{ usuario['username'] }}</h2>

        <form method="post">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div>
                <label>Nueva clave</label>
                <input type="password" name="password_nueva" autocomplete="new-password" minlength="8" required>
            </div>

            <div>
                <label>Confirmar nueva clave</label>
                <input type="password" name="password_confirmacion" autocomplete="new-password" minlength="8" required>
            </div>

            <button class="button login-button" type="submit">Guardar clave</button>
        </form>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }} login-flash">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

</body>
</html>
