<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIG - Ruda Macho Rugby Club</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="login-logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo del club">
        </div>

        <h1>Ruda Macho Rugby Club</h1>
        <h2>Sistema Integral de Gestion (SIG)</h2>

        <form method="post">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div>
                <label>Usuario</label>
                <input type="text" name="username" required>
            </div>

            <div>
                <label>Clave</label>
                <input type="password" name="password" required>
            </div>

            <button class="button login-button" type="submit">Ingresar</button>
        </form>

        <div class="login-links">
            <a href="{{ url_for('solicitar_recuperacion_password') }}">Olvide mi clave</a>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }} login-flash">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

</body>
</html>
